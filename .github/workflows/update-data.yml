name: Update Data

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r python/requirements.txt

      - name: Scrape data
        run: |
          python3 python/scripts/wealth_scraper.py \
            --wealth-links python/data/wealth_links.txt \
            --wealth-output frontend/public/data/wealth.json \
            --fund-links python/data/fund_links.txt \
            --fund-output frontend/public/data/fund.json

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- frontend/public/data; then
            echo "No data changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/*.json
          git commit -m "chore(data): auto update"
          git push
